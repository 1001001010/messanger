services:
  postgres:
    image: postgres:17-alpine
    container_name: messanger-postgres

    environment:
      POSTGRES_DB: messanger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: messanger-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: messanger-server

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      APP_ENV: docker
      DB_URL: postgres://postgres:postgres@postgres:5432/messanger?sslmode=disable
      LOG_LEVEL: debug
      GRPC_PORT: 50051

    ports:
      - "50051:50051"

    volumes:
      - ./apps/server:/app

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: frontend

    command: pnpm run dev

    ports:
      - "3000:3000"

    volumes:
      - ./apps/web:/app
      - /app/node_modules

    environment:
      NODE_ENV: development

    depends_on:
      - server

volumes:
  postgres-data:
  redis-data:
